        wc2.addEventListener('click', () => {
            userInputBox.value += "[APORTE MACROECONÓMICO: Basado en el modelo keynesiano, ante una recesión, el aumento del Gasto Público (G) es vital para estimular la demanda agregada, compensando la caída del consumo (C) privado e impidiendo un colapso en los niveles de empleo.] ";
            wc2.disabled = true; wc2.innerText = "✓ Gasto Público Aplicado"; updateCharCounter(); userInputBox.focus();
        });

        document.getElementById('btn-start').addEventListener('click', async () => {
            const errorMsg = document.getElementById('error-msg'); const btn = document.getElementById('btn-start'); btn.innerText = "Procesando...";
            try {
                const idInput = document.getElementById('student-id').value.trim(); const nameInput = document.getElementById('student-name').value.trim();
                const apiInput = document.getElementById('api-key-input') ? document.getElementById('api-key-input').value.trim() : "";
                
                if (apiInput) { API_KEY = apiInput; sessionStorage.setItem("GEMINI_API_KEY", API_KEY); } 
                else if (!API_KEY) { errorMsg.innerText = "Debe ingresar la Clave API generada en Google AI Studio."; errorMsg.style.display = 'block'; btn.innerText = "Ingresar al Debate"; return; }
                errorMsg.style.display = 'none';
                
                if(!idInput || !nameInput || isNaN(idInput) || idInput.length < 9) { errorMsg.innerText = "Ingrese datos válidos."; errorMsg.style.display = 'block'; btn.innerText = "Ingresar al Debate"; return; }

                let attempts = parseInt(localStorage.getItem('admin_lock_' + idInput)) || 0;
                if (attempts >= 5) { document.getElementById('lock-modal').style.display = 'flex'; return; }

                btn.disabled = true; await new Promise(r => setTimeout(r, 600)); localStorage.setItem('admin_lock_' + idInput, attempts + 1);
                
                studentData.id = idInput; studentData.name = nameInput; const lastDigit = parseInt(idInput.slice(-1));
                let initMessage = "";
                
                if (lastDigit % 2 === 0) { studentData.type = "NODO: DEFENSA NEOLIBERAL"; studentData.classTheme = "neoliberal"; window.activeSystemPrompt = promptPar; initMessage = initPar.replace("[NOMBRE]", studentData.name); } 
                else { studentData.type = "NODO: SUSTITUCIÓN IMPORTACIONES"; studentData.classTheme = "sustitucion"; window.activeSystemPrompt = promptImpar; initMessage = initImpar.replace("[NOMBRE]", studentData.name); }
                
                document.getElementById('node-badge').textContent = studentData.type; document.getElementById('disp-id').textContent = studentData.id;
                document.getElementById('disp-name').textContent = studentData.name; document.getElementById('start-modal').style.display = 'none';
                document.getElementById('status-text').innerText = "RONDAS RESTANTES: " + MAX_ROUNDS;
                
                chatHistory = [{ role: "user", parts: [{ text: "Inicia la evaluación presentando tu postura macroeconómica basándote en mis datos." }] }, { role: "model", parts: [{ text: initMessage }] }];
                appendMessage('bot', initMessage, false, studentData.classTheme); userInputBox.disabled = false; userInputBox.focus();
            } catch (err) { errorMsg.innerText = "Error: " + err.message; errorMsg.style.display = 'block'; document.getElementById('btn-start').disabled = false; }
        });

        async function fetchWithFallback(payload) {
            if (!activeModelCache) {
                document.getElementById('status-text').innerText = "CALIBRANDO MOTOR NEURAL...";
                try {
                    const listResponse = await fetch('https://generativelanguage.googleapis.com/v1beta/models?key=' + API_KEY);
                    if (!listResponse.ok) throw new Error("HTTP " + listResponse.status);
                    const data = await listResponse.json();
                    const validModels = data.models.filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent"));
                    const prefs = ["gemini-2.5-flash", "gemini-1.5-flash", "gemini-1.5-pro", "gemini-1.0"];
                    for (let pref of prefs) { const found = validModels.find(m => m.name.includes(pref)); if (found) { activeModelCache = found.name; break; } }
                    if (!activeModelCache) activeModelCache = validModels[0].name; 
                } catch (e) { activeModelCache = "models/gemini-2.5-flash"; }
            }
            const modelPath = activeModelCache.startsWith("models/") ? activeModelCache : 'models/' + activeModelCache;
            const url = 'https://generativelanguage.googleapis.com/v1beta/' + modelPath + ':generateContent?key=' + API_KEY;
            
            let rondasText = MAX_ROUNDS - round; if (rondasText < 0) rondasText = "EVALUACIÓN FINALIZADA";
            document.getElementById('status-text').innerText = 'EN LÍNEA | RONDAS RESTANTES: ' + rondasText;

            let retries = 3;
            while (retries > 0) {
                try {
                    const controller = new AbortController(); const timeoutId = setTimeout(() => controller.abort(), 60000); 
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (!response.ok) { if (response.status === 429) { await new Promise(r => setTimeout(r, 5000)); retries--; continue; } throw new Error("HTTP " + response.status); }
                    return await response.json();
                } catch (err) { if (err.name === 'AbortError') { retries--; if(retries <= 0) throw new Error("Timeout."); continue; } throw err; }
            }
        }

        function triggerCooldown() {
            isOnCooldown = true; btnSend.disabled = true; userInputBox.disabled = true; let timeLeft = 60; charCounter.classList.add('cooldown');
            const timer = setInterval(() => {
                timeLeft--; charCounter.innerText = '⏱️ ENFRIAMIENTO DE SISTEMA: ' + timeLeft + 's...';
                if (timeLeft <= 0) { clearInterval(timer); isOnCooldown = false; charCounter.classList.remove('cooldown'); userInputBox.disabled = false; updateCharCounter(); userInputBox.focus(); }
            }, 1000);
        }

        async function callGemini(userText) {
            const chatBox = document.getElementById('chat-box'); const indicator = document.getElementById('typing-indicator');
            userInputBox.disabled = true; btnSend.disabled = true; indicator.style.display = 'block'; chatBox.appendChild(indicator); chatBox.scrollTop = chatBox.scrollHeight;
            appendMessage('user', userText);
            
            let textForModel = userText;
            if (round >= MAX_ROUNDS && !abortTriggered) { textForModel += "\n\n[INSTRUCCIÓN DEL SISTEMA: Esta es la ronda final. Analiza rigurosamente si el estudiante logró desmantelar tu postura económica utilizando los conceptos del 'Buen Vivir', políticas públicas, inversión y redistribución que se estudian en la materia.\nCierra el debate. Emite tu dictamen final en este formato estricto:\n\n### DICTAMEN DE AUDITORÍA\n**1. Sustento del Buen Vivir (Max 3.0 pts):** [Evalúa].\n**2. Rigor en Políticas Públicas (Max 3.0 pts):** [Evalúa].\n**3. Resistencia Adversarial (Max 4.0 pts):** [Evalúa].\n**Calificación Total Sugerida:** [Suma]/10.0\n\n[Mensaje final]]"; }
            
            chatHistory.push({ role: "user", parts: [{ text: textForModel }] });
            try {
                const data = await fetchWithFallback({ systemInstruction: { parts: [{ text: window.activeSystemPrompt }] }, contents: chatHistory, generationConfig: { temperature: 0.3 }, safetySettings: safetyOverrides });
                
                // NUEVO BLOQUE DE AUDITORÍA DE PAYLOAD (Manejo de Excepciones)
                if (data.error) {
                    throw new Error(data.error.message || "Error interno del endpoint de Google Cloud.");
                }
                if (!data.candidates || !data.candidates[0]) {
                    console.error("Payload anómalo interceptado:", data);
                    let blockReason = "Respuesta vacía o error de cuota silencioso.";
                    if (data.promptFeedback && data.promptFeedback.blockReason) {
                        blockReason = "Filtro de seguridad estricto de Google activado: " + data.promptFeedback.blockReason;
                    }
                    throw new Error("El modelo de IA no devolvió texto. Causa: " + blockReason);
                }
                // FIN DEL BLOQUE DE AUDITORÍA

                const botReply = data.candidates[0].content.parts[0].text;
                chatHistory.push({ role: "model", parts: [{ text: botReply }] }); indicator.style.display = 'none';
                appendMessage('bot', marked.parse(botReply), true, studentData.classTheme);
                if (round >= MAX_ROUNDS) { finalizarSimulacion(botReply); } else { userInputBox.value = ''; triggerCooldown(); }
            } catch (error) { indicator.style.display = 'none'; alert("ERROR DE COMUNICACIÓN API: " + error.message); chatHistory.pop(); userInputBox.disabled = false; updateCharCounter(); }
        }

        function finalizarSimulacion(botReply) {
            document.getElementById('input-area').style.display = 'none';
            let dictamenTexto = botReply; const dictamenIndex = botReply.indexOf("### DICTAMEN DE AUDITORÍA");
            if (dictamenIndex !== -1) { dictamenTexto = botReply.substring(dictamenIndex); }
            let hostCode = generateHostCode(studentData.id, dictamenTexto); const leyenda = "**DEBATE FINALIZADO.** Descargue el Acta y súbala a Moodle.";
            appendMessage('bot', marked.parse(leyenda), true, studentData.classTheme); transcriptLog.pop();
            let dictamenHtmlFinal = marked.parse(dictamenTexto) + "<br><br><div style='background-color:#f1f5f9; border:1px solid #cbd5e1; padding:15px; border-radius:8px; font-family:monospace; font-size:13px; font-weight:bold; color:#0f172a; text-align:center;'>🔑 CÓDIGO HOST DE SEGURIDAD: " + hostCode + "</div>";
            prepararActaPDF(dictamenHtmlFinal);
            document.getElementById('status-text').style.display = 'none'; document.getElementById('pdf-area').style.display = 'flex';
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        async function prepararActaPDF(htmlDictamen) {
            document.getElementById('pdf-name').innerText = studentData.name; document.getElementById('pdf-id').innerText = studentData.id;
            document.getElementById('pdf-nodo').innerText = studentData.type; document.getElementById('pdf-date').innerText = new Date().toLocaleString();
            const transcriptContainer = document.getElementById('pdf-transcript'); transcriptContainer.innerHTML = '';
            transcriptLog.forEach(log => {
                if(log.text.includes("Inicia la evaluación")) return;
                const roleClass = log.role === 'bot' ? 't-bot' : 't-user';
                transcriptContainer.innerHTML += "<div class='" + roleClass + "'>" + (log.role === "bot" ? "MAQUINA" : "ESTUDIANTE") + "</div><div class='t-content'>" + log.text + "</div><br>";
            });
            document.getElementById('pdf-dictamen').innerHTML = htmlDictamen;
            return new Promise(resolve => setTimeout(resolve, 500));
        }

        function updateCharCounter() {
            if(isOnCooldown) return;
            const textLen = userInputBox.value.trim().length;
            charCounter.innerText = "Caracteres: " + textLen + " / Rango: 500 - 2500";
            if (textLen >= 500 && textLen <= 2500) { charCounter.classList.remove('error'); btnSend.disabled = false; } 
            else { charCounter.classList.add('error'); btnSend.disabled = true; }
            if(userInputBox.disabled) btnSend.disabled = true;
        }

        userInputBox.addEventListener('input', updateCharCounter);
        btnSend.addEventListener('click', () => {
            if(abortTriggered || isOnCooldown) return;
            const text = userInputBox.value.trim();
            if(text.length < 500 || text.length > 2500) { alert("Violación de Formato. Requisito: 500 a 2500 caracteres."); return; }
            round++; callGemini(text);
        });

        function appendMessage(sender, text, isMarkdown = false, classTheme = 'neoliberal') {
            const chatBox = document.getElementById('chat-box'); const msgDiv = document.createElement('div'); msgDiv.className = "message " + sender;
            const avatarDiv = document.createElement('div'); avatarDiv.className = "avatar " + sender; avatarDiv.innerText = sender === 'bot' ? 'IA Macroeconómica' : studentData.name;
            const bubbleDiv = document.createElement('div'); bubbleDiv.className = 'bubble'; if(sender === 'bot') bubbleDiv.classList.add(classTheme);
            if (isMarkdown) { bubbleDiv.innerHTML = text; } else { bubbleDiv.innerText = text; }
            msgDiv.appendChild(avatarDiv); msgDiv.appendChild(bubbleDiv);
            transcriptLog.push({ role: sender, text: isMarkdown ? text : text });
            chatBox.insertBefore(msgDiv, document.getElementById('typing-indicator')); chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('btn-download').addEventListener('click', async () => {
            const acta = document.getElementById('acta-auditable-moodle'); const appCapture = document.getElementById('app-capture'); const btn = document.getElementById('btn-download');
            btn.innerHTML = "Generando PDF Oficial..."; btn.disabled = true;
            acta.style.display = 'block'; appCapture.style.display = 'none'; acta.classList.add('pdf-export-mode');
            await html2pdf().set({ margin: 15, filename: "Acta_ColiseoMacro_" + studentData.id + ".pdf", image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true, logging: false }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(acta).save();
            acta.style.display = 'none'; appCapture.style.display = 'flex'; btn.disabled = false; btn.innerHTML = "Descargar Acta Oficial PDF";
        });
    }

    const iframe = document.getElementById('coliseo-sandbox');
    const doc = iframe.contentWindow.document;
    
    const finalDOM = `
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="utf-8">
            <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"><\/script>
            <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"><\/script>
            <style>${cssContent}</style>
        </head>
        <body>
            ${htmlContent}
            <script>
                (${agentLogic.toString()})();
            <\/script>
        </body>
        </html>
    `;
    
    doc.open();
    doc.write(finalDOM);
    doc.close();
})();
</script>
