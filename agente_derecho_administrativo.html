        // LÓGICA DE VALIDACIÓN DOCENTE (HASH HMAC-LIKE)
        function generateHostCode(id, dictamenTexto) {

            let hex = "";
            for(let i = 0; i < payload.length; i++) {
                let xor = payload.charCodeAt(i) ^ key.charCodeAt(i % key.length);
                hex += ("00" + xor.toString(16)).slice(-2);
            }
            return hex.toUpperCase();
        }

        // AUTODETECCIÓN Y FALLBACK DE GEMINI
        async function fetchWithFallback(payload) {
            if (!activeModelCache) {
                document.getElementById('status-text').innerText = "CALIBRANDO MOTOR NEURAL...";
                try {
                    const listResponse = await fetch('https://generativelanguage.googleapis.com/v1beta/models?key=' + API_KEY);
                    if (!listResponse.ok) throw new Error("HTTP " + listResponse.status);
                    
                    const data = await listResponse.json();
                    const validModels = data.models.filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent"));
                    
                    if (validModels.length === 0) throw new Error("API Key inválida o sin modelos de generación.");
                    
                    const prefs = ["gemini-2.5-flash", "gemini-1.5-flash", "gemini-1.5-pro", "gemini-1.0", "gemini-pro"];
                    for (let pref of prefs) {
                        const found = validModels.find(m => m.name.includes(pref));
                        if (found) { activeModelCache = found.name; break; }
                    }
                    if (!activeModelCache) activeModelCache = validModels[0].name; 
                } catch (e) {
                    console.warn("Fallo en autodetección, usando modelo predeterminado: " + e.message);
                    activeModelCache = "models/gemini-1.5-flash";
                }
            }
            
            const modelPath = activeModelCache.startsWith("models/") ? activeModelCache : \`models/\${activeModelCache}\`;
            const url = 'https://generativelanguage.googleapis.com/v1beta/' + modelPath + ':generateContent?key=' + API_KEY;
            
            let rondasText = MAX_ROUNDS - round;
            if (rondasText < 0) rondasText = "DEBATE FINALIZADO";
            document.getElementById('status-text').innerText = \`TRIBUNAL EN LÍNEA | RONDAS RESTANTES: \${rondasText}\`;

            let retries = 3;
            while (retries > 0) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 60000); 
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    if (!response.ok) {
                        let errMsg = "Error HTTP " + response.status;
                        if (response.status === 429) {
                            await new Promise(r => setTimeout(r, 5000));
                            retries--;
                            continue;
                        }
                        throw new Error(errMsg);
                    }
                    return await response.json();
                } catch (err) {
                    if (err.name === 'AbortError') {
                        retries--;
                        if(retries <= 0) throw new Error("La IA tardó demasiado en responder (Expiración de tiempo).");
                        continue;
                    }
                    throw err; 
                }
            }
        }
